name: Daily AI Trending

on:
  schedule:
    - cron: '0 0 * * *'       # UTC 0:00 = 北京时间 8:00
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python github_trending.py
