name: Daily GitHub Trending

on:
  schedule:
    - cron: '0 8 * * *'       # 每天早上8点（北京时间）
  workflow_dispatch:            # 手动触发按钮

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python github_trending.py
